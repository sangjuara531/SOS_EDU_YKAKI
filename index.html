<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOSIALISASI EDUKASI YKAKI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #7fa9ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Soft background blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .blob-1 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, #edf0f8 0%, transparent 70%);
    top: -80px; left: -100px;
  }
  .blob-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #eef0f8 0%, transparent 70%);
    bottom: -60px; right: -60px;
  }
  .blob-3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #f0f2fa 0%, transparent 70%);
    top: 40%; left: 5%;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    pointer-events: none;
  }

  /* Balloon decoration */
  .decoration {
    position: absolute;
    top: 0; right: 0;
    width: 210px; height: 290px;
    z-index: 5;
    pointer-events: none;
  }

  /* Main card */
  .card {
    background: #ffffff;
    border: 1px solid #e8eaed;
    border-radius: 28px;
    padding: 46px 38px 42px;
    width: 90%;
    max-width: 460px;
    text-align: center;
    position: relative;
    z-index: 10;
    box-shadow:
      0 4px 40px rgba(0, 0, 0, 0.07),
      0 1px 4px rgba(0, 0, 0, 0.04);
    animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo-ring {
    /* width: 386px; height: 286px; */
    /* border-radius: 50%; */
    /* background: linear-gradient(135deg, #e8ecf5 0%, #d0d8eb 100%); */
    /* border: 2px solid #e2e6f0; */
    display: flex; justify-content: center;
    /* margin: 0 auto 20px; */
    font-size: 30px;
    /* animation: fadeUp 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both; */
    
  }

  /* Replace emoji with actual logo image: */
  .logo-ring img { width: 300px; height: 200px; object-fit: contain; }

  h1 {
    font-size: 15px;
    font-weight: 800;
    color: #1a1d23;
    margin-bottom: 6px;
    line-height: 1.55;
    letter-spacing: 0.1px;
    animation: fadeUp 0.7s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .date {
    font-size: 13px;
    color: #000000;
    font-weight: 400;
    margin-bottom: 18px;
    animation: fadeUp 0.7s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c8cdd8, transparent);
    margin: 0 auto 28px;
    border-radius: 2px;
    animation: fadeUp 0.7s 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  /* Menu buttons */
  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .menu-btn {
    display: block;
    width: 100%;
    padding: 15px 24px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    text-decoration: none;
  }

  .menu-btn:nth-child(1) { animation: fadeUp 0.6s 0.25s both; }
  .menu-btn:nth-child(2) { animation: fadeUp 0.6s 0.3s both; }
  .menu-btn:nth-child(3) { animation: fadeUp 0.6s 0.35s both; }
  .menu-btn:nth-child(4) { animation: fadeUp 0.6s 0.4s both; }
  .menu-btn:nth-child(5) { animation: fadeUp 0.6s 0.45s both; }

  .btn-active {
    background: #f2f4f8;
    color: #2e3340;
    border: 1px solid #3b71ff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(255,255,255,0.9) inset;
  }
  .btn-active:hover {
    transform: translateY(-2px);
    background: #eceef5;
    box-shadow: 0 6px 20px rgba(0,0,0,0.09);
  }
  .btn-active:active { transform: translateY(0); }

  .btn-disabled {
    background: #f9f9fb;
    color: #bcc0ca;
    border: 1px solid #ebebef;
    cursor: not-allowed;
  }

  .btn-cta {
    background: #e8eaf5;
    color: #3a4070;
    border: 1px solid #d5d9ee;
    box-shadow: 0 2px 10px rgba(58,64,112,0.1);
  }
  .btn-cta:hover {
    transform: translateY(-2px);
    background: #e0e3f0;
    box-shadow: 0 6px 20px rgba(58,64,112,0.16);
  }
  .btn-cta:active { transform: translateY(0); }
</style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Clouds kiri -->
  <svg class="cloud" style="top:55%;left:-18px;opacity:0.6;" width="115" height="64" viewBox="0 0 115 64">
    <ellipse cx="57" cy="48" rx="52" ry="19" fill="#fff"/>
    <ellipse cx="39" cy="34" rx="27" ry="23" fill="#fff"/>
    <ellipse cx="71" cy="37" rx="23" ry="19" fill="#fff"/>
  </svg>
  <svg class="cloud" style="top:76%;left:8px;opacity:0.38;" width="82" height="46" viewBox="0 0 82 46">
    <ellipse cx="41" cy="35" rx="37" ry="14" fill="#fff"/>
    <ellipse cx="29" cy="24" rx="20" ry="17" fill="#fff"/>
    <ellipse cx="54" cy="27" rx="17" ry="14" fill="#fff"/>
  </svg>

  <!-- Clouds kanan bawah -->
  <svg class="cloud" style="top:60%;right:-14px;opacity:0.65;" width="125" height="68" viewBox="0 0 125 68">
    <ellipse cx="62" cy="52" rx="57" ry="20" fill="#fff"/>
    <ellipse cx="44" cy="37" rx="30" ry="25" fill="#fff"/>
    <ellipse cx="80" cy="40" rx="26" ry="21" fill="#fff"/>
  </svg>
  <svg class="cloud" style="top:79%;right:5px;opacity:0.4;" width="88" height="48" viewBox="0 0 88 48">
    <ellipse cx="44" cy="36" rx="40" ry="14" fill="#fff"/>
    <ellipse cx="31" cy="26" rx="21" ry="18" fill="#fff"/>
    <ellipse cx="58" cy="29" rx="18" ry="15" fill="#fff"/>
  </svg>

  <!-- Dekorasi balon & kado (pojok kanan atas) -->
  <svg class="decoration" viewBox="0 0 210 290" xmlns="http://www.w3.org/2000/svg">
    <!-- Tali balon -->
    <path d="M88 128 Q86 150 82 178" stroke="#c0c5d0" stroke-width="1" fill="none"/>
    <path d="M114 120 Q112 144 108 178" stroke="#c0c5d0" stroke-width="1" fill="none"/>
    <path d="M142 112 Q140 138 136 178" stroke="#c0c5d0" stroke-width="1" fill="none"/>
    <path d="M73 135 Q71 155 68 178" stroke="#c0c5d0" stroke-width="1" fill="none"/>
    <path d="M158 124 Q157 148 153 178" stroke="#c0c5d0" stroke-width="1" fill="none"/>

    <!-- Balon 1 -->
    <ellipse cx="88" cy="100" rx="20" ry="25" fill="#dde2ec" stroke="#c8cdd8" stroke-width="0.8"/>
    <ellipse cx="83" cy="91" rx="6" ry="4" fill="rgba(255,255,255,0.55)" transform="rotate(-20 83 91)"/>

    <!-- Balon 2 (tengah, lebih besar) -->
    <ellipse cx="114" cy="92" rx="23" ry="27" fill="#e8eaf5" stroke="#d0d5e5" stroke-width="0.8"/>
    <ellipse cx="108" cy="82" rx="7" ry="5" fill="rgba(255,255,255,0.55)" transform="rotate(-20 108 82)"/>

    <!-- Balon 3 -->
    <ellipse cx="143" cy="85" rx="19" ry="23" fill="#f0f2f8" stroke="#dde0ec" stroke-width="0.8"/>
    <ellipse cx="138" cy="76" rx="5" ry="4" fill="rgba(255,255,255,0.55)" transform="rotate(-20 138 76)"/>

    <!-- Balon 4 (kecil kiri) -->
    <ellipse cx="71" cy="108" rx="15" ry="19" fill="#e4e7f2" stroke="#cdd1e3" stroke-width="0.8"/>
    <ellipse cx="67" cy="100" rx="4" ry="3" fill="rgba(255,255,255,0.5)" transform="rotate(-20 67 100)"/>

    <!-- Balon 5 (kecil kanan) -->
    <ellipse cx="160" cy="98" rx="17" ry="21" fill="#f5f6fb" stroke="#dde0ed" stroke-width="0.8"/>
    <ellipse cx="155" cy="89" rx="5" ry="3.5" fill="rgba(255,255,255,0.55)" transform="rotate(-20 155 89)"/>

    <!-- Kotak kado - badan -->
    <rect x="70" y="192" width="96" height="74" rx="7" fill="#f2f4f8" stroke="#dde0ea" stroke-width="1"/>
    <!-- Pita vertikal -->
    <rect x="111" y="192" width="12" height="74" rx="2" fill="#c8cdd8"/>
    <!-- Pita horizontal -->
    <rect x="70" y="224" width="96" height="12" rx="2" fill="#c8cdd8"/>
    <!-- Tutup kado -->
    <rect x="65" y="181" width="106" height="19" rx="5" fill="#e8ecf2" stroke="#dde0ea" stroke-width="1"/>
    <rect x="111" y="181" width="12" height="19" rx="2" fill="#c8cdd8"/>
    <!-- Pita busur -->
    <ellipse cx="101" cy="178" rx="15" ry="9" fill="#dde1ec" stroke="#c8cdd8" stroke-width="0.8" transform="rotate(-22 101 178)"/>
    <ellipse cx="132" cy="178" rx="15" ry="9" fill="#dde1ec" stroke="#c8cdd8" stroke-width="0.8" transform="rotate(22 132 178)"/>
    <ellipse cx="117" cy="179" rx="9" ry="7" fill="#e8ecf5" stroke="#c8cdd8" stroke-width="0.8"/>
  </svg>

  <!-- Card Utama -->
  <div class="card">

    <!-- Logo (ganti isi dengan <img src="logo.png"> jika punya logo) -->
    <div class="logo-ring"><img src="https://ykaki.org/wp-content/uploads/2021/10/YKAKI-Logo-2.png" alt=""></div>

    <h1>Sosialisasi Edukasi Yayasan Kasih Anak Indonesia</h1>
    <p class="date">29 April 2026</p>
    <div class="divider"></div>

    <div class="menu-list">
      <button class="menu-btn btn-active" onclick="alert('Link Zoom akan dibuka')">LINK ZOOM</button>
      <button class="menu-btn btn-active" onclick="alert('Membuka Daftar Hadir')">ABSENSI</button>
      <button class="menu-btn btn-active" onclick="alert('Selamat Mengerjakan PRE TEST')">PRE TEST</button>
      <button class="menu-btn btn-active" onclick="alert('Selamat Mengerjakan POST TEST')">POST TEST</button>
      <button class="menu-btn btn-active">PENGAMBILAN SERTIFIKAT</button>
    </div>
  </div>

</body>
</html>
